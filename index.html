<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeReview Roulette</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CodeReview Roulette</h1>
            <div id="auth-section">
                <div id="login-box">
                    <input type="password" id="token-input" placeholder="Enter GitHub Token (ghp_...)">
                    <button onclick="login()">Connect</button>
                </div>
                <div id="user-info" style="display:none;">
                    <img id="avatar" src="" width="40">
                    <span id="username"></span>
                    <button onclick="logout()">Logout</button>
                </div>
            </div>
        </header>

        <!-- NAVIGATION (shown after login) -->
        <nav id="main-nav" style="display:none;">
            <button class="nav-btn active" onclick="showPage('submit')">Submit Code</button>
            <button class="nav-btn" onclick="showPage('browse')">Review Random Code</button>
            <button class="nav-btn" onclick="showPage('dashboard')">My Dashboard</button>
        </nav>

        <!-- PAGE 1: SUBMIT CODE -->
        <section id="page-submit" class="page">
            <h2>Submit Code for Review</h2>
            <form id="review-form">
                <input type="text" id="title" placeholder="Title (e.g., 'React useEffect issue')" required>
                <textarea id="description" placeholder="Describe what you need help with (optional)..." rows="3"></textarea>
                <select id="language" required>
                    <option value="">Select Language</option>
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="react">React</option>
                    <option value="css">CSS</option>
                    <option value="html">HTML</option>
                    <option value="other">Other</option>
                </select>
                <textarea id="code" placeholder="Paste your code here..." rows="12" required></textarea>
                <button type="submit">Submit for Review</button>
            </form>
        </section>

        <!-- PAGE 2: BROWSE/REVIEW OTHERS -->
        <section id="page-browse" class="page" style="display:none;">
            <h2>Review Someone's Code</h2>
            <button onclick="loadRandomCode()" class="big-btn">🎲 Get Random Code to Review</button>
            <div id="random-code-display" style="margin-top:20px;"></div>
        </section>

        <!-- PAGE 3: DASHBOARD -->
        <section id="page-dashboard" class="page" style="display:none;">
            <div class="dashboard-grid">
                <div class="dash-column">
                    <h3>My Submissions</h3>
                    <div id="my-submissions">Loading...</div>
                </div>
                <div class="dash-column">
                    <h3>My Reviews (Given)</h3>
                    <div id="my-reviews">Loading...</div>
                </div>
            </div>
        </section>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
