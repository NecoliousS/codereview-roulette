<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeReview Roulette</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>CodeReview Roulette</h1>
        
        <!-- LOGIN SECTION -->
        <div id="login-box">
            <p>Enter your GitHub Personal Access Token:</p>
            <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" style="width: 300px; padding: 10px;">
            <button onclick="login()" style="margin-left: 10px;">Connect</button>
            <p style="font-size: 12px; margin-top: 10px;">
                <a href="https://github.com/settings/tokens/new?description=CodeReview%20Roulette&scopes=repo,gist" target="_blank">
                    Click here to get your token
                </a> 
                (check "repo" and "gist" boxes)
            </p>
        </div>

        <!-- USER INFO (hidden until logged in) -->
        <div id="user-info" style="display: none; margin: 20px 0;">
            <img id="avatar" src="" width="40" style="border-radius: 50%; vertical-align: middle;">
            <span id="username" style="margin-left: 10px; font-weight: bold;"></span>
            <button onclick="logout()" style="margin-left: 20px;">Logout</button>
        </div>

        <!-- APP CONTENT (hidden until logged in) -->
        <div id="app" style="display: none; margin-top: 30px;">
            <h2>Request a Code Review</h2>
            <form id="review-form" style="margin-top: 20px;">
                <input type="text" id="title" placeholder="What needs review?" required style="width: 100%; margin-bottom: 10px; padding: 8px;"><br>
                <select id="language" required style="padding: 8px; margin-bottom: 10px;">
                    <option value="">Select Language</option>
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="react">React</option>
                </select><br>
                <textarea id="code" placeholder="Paste your code here..." rows="10" style="width: 100%; padding: 8px;" required></textarea><br>
                <button type="submit" style="margin-top: 10px;">Submit for Review</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
