<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeReview Roulette</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CodeReview Roulette</h1>
            <div id="auth-section">
                <button id="login-btn" onclick="login()">Login with GitHub</button>
                <div id="user-info" style="display:none;">
                    <img id="avatar" src="" alt="" width="40">
                    <span id="username"></span>
                    <button onclick="logout()">Logout</button>
                </div>
            </div>
        </header>

        <main id="app" style="display:none;">
            <section class="submit-review">
                <h2>Request a Review</h2>
                <form id="review-form">
                    <input type="text" id="title" placeholder="What do you need reviewed?" required>
                    <select id="language" required>
                        <option value="">Select Language</option>
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="react">React</option>
                        <option value="other">Other</option>
                    </select>
                    <textarea id="code" placeholder="Paste your code here..." rows="10" required></textarea>
                    <button type="submit">Submit for Review</button>
                </form>
            </section>

            <section class="dashboard">
                <div class="column">
                    <h3>My Requests</h3>
                    <div id="my-requests"></div>
                </div>
                <div class="column">
                    <h3>Reviews to Complete</h3>
                    <div id="my-reviews"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/github-api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Check for token in URL (from callback)
        const hash = window.location.hash;
        if (hash.includes('token=')) {
            const token = hash.split('token=')[1].split('&')[0];
            localStorage.setItem('github_token', token);
            window.location.hash = '';
            location.reload();
        }
    </script>
</body>
</html>
